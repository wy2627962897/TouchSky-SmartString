name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04  # 显式指定 22.04 环境，更稳定
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          # 安装 buildozer 必需的所有 Linux 依赖
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            build-essential \
            python3-setuptools

          # 安装 Python 端的编译工具
          pip3 install --user --upgrade Cython==0.29.33 buildozer virtualenv

      - name: Build with Buildozer
        run: |
          # 预先接受所有 SDK 许可，避免使用管道
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # 直接运行 buildozer，因为已经在 spec 里设置了同意许可
          /home/runner/.local/bin/buildozer -v android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: bin/*.apk
